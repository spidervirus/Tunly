services:
  tunly-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    environment:
      - TUNLY_TOKEN=${TUNLY_TOKEN:-secret}
      - TUNLY_DOMAIN=${TUNLY_DOMAIN:-localhost}
      - PORT=3010
    ports:
      - "3010:3010"

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
