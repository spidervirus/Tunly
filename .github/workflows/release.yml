name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: build-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build: [linux, macos, macos-arm, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: stable
            target: x86_64-unknown-linux-musl
          - build: macos
            os: macos-latest
            rust: stable
            target: x86_64-apple-darwin
          - build: macos-arm
            os: macos-latest
            rust: stable
            target: aarch64-apple-darwin
          - build: windows
            os: windows-latest
            rust: stable
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build tunly-client
        run: cargo build --release --target ${{ matrix.target }} -p tunly-client

      - name: Package (Unix)
        if: matrix.build != 'windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../tunly-client-${{ matrix.target }}.tar.gz tunly-client
          cd -

      - name: Package (Windows)
        if: matrix.build == 'windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../tunly-client-${{ matrix.target }}.zip tunly-client.exe
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunly-client-${{ matrix.target }}
          path: tunly-client-${{ matrix.target }}.*

  publish-release:
    name: publish-release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/tunly-client-*
          draft: false
          prerelease: false
          generate_release_notes: true
